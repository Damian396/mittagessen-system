<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 10px;
  margin: 5px;
  background: #14968F;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<!-- 🔥 PDF Upload -->
<div class="card">
<h2>Menü PDF Upload</h2>
<input type="file" id="file">
<button onclick="uploadPDF()">Upload</button>
</div>

<!-- 🔥 EXPORT -->
<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Wochenübersicht</button>
<button onclick="exportStats()">Analyse PDF</button>
</div>

<!-- 🔥 TABELLE -->
<div class="card">
<h2>Übersicht (2 Wochen)</h2>

<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- 🔥 DETAILS -->
<div id="detailContainer"></div>

</div>

<script src="supabase.js"></script>

<script>

// 🔥 Arbeitstage
function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function formatDate(d) {
  return d.toISOString().split("T")[0];
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// 🔥 DATEN LADEN
async function loadAdminData() {

  const days = getNextWorkdays(10);

  const { data: orders } = await supabase
    .from("orders")
    .select(`
      order_date,
      selected_menu,
      profiles ( full_name )
    `);

  const tbody = document.querySelector("#summaryTable tbody");
  const detail = document.getElementById("detailContainer");

  tbody.innerHTML = "";
  detail.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDate(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    // Tabelle
    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${m1}</td>
        <td>${m2}</td>
      </tr>
    `;

    // Details
    let list = "";

    dayOrders.forEach(o => {
      list += `<li>${o.profiles?.full_name || "Unbekannt"} → ${o.selected_menu}</li>`;
    });

    detail.innerHTML += `
      <div class="card">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <ul>${list || "<li>Keine Bestellungen</li>"}</ul>
      </div>
    `;
  });
}

// 🔥 PDF Upload
async function uploadPDF() {

  const file = document.getElementById("file").files[0];

  const { data, error } = await supabase.storage
    .from("menus")
    .upload("menu.pdf", file, { upsert:true });

  const url = `https://YOUR_PROJECT.supabase.co/storage/v1/object/public/menus/menu.pdf`;

  await supabase.from("menu_files").insert({ file_url:url });

  alert("PDF hochgeladen!");
}

// 🔥 Export Woche
async function exportWeek() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await supabase.from("orders").select("*");

  let y = 10;
  doc.text("Wochenübersicht", 10, y);

  data.forEach(o => {
    y += 8;
    doc.text(`${o.order_date} - ${o.selected_menu}`, 10, y);
  });

  doc.save("wochenbericht.pdf");
}

// 🔥 Analyse
async function exportStats() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await supabase.from("orders").select("*");

  const total = data.length;
  const m1 = data.filter(x => x.selected_menu==="Menu 1").length;
  const m2 = data.filter(x => x.selected_menu==="Menu 2").length;

  doc.text("Analyse", 10, 10);
  doc.text(`Total: ${total}`, 10, 20);
  doc.text(`Menu1: ${m1}`, 10, 30);
  doc.text(`Menu2: ${m2}`, 10, 40);

  doc.save("analyse.pdf");
}

// 🚀 Start
loadAdminData();

</script>

</body>
</html>
