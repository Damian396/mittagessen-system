<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { margin:0; font-family:Arial; background:#14968F; color:white; }
.container { max-width:1000px; margin:auto; padding:40px; }
.card { background:white; color:black; padding:20px; border-radius:12px; margin-bottom:20px; }

button {
  background:#14968F;
  color:white;
  border:none;
  padding:8px;
  cursor:pointer;
  margin-top:5px;
}

.file-item {
  padding:10px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<!-- UPLOAD -->
<div class="card">
<h2>Menü PDF Upload</h2>
<input type="file" id="fileInput">
<button onclick="uploadPDF()">Upload</button>
</div>

<!-- PDF LISTE -->
<div class="card">
<h2>PDF Verwaltung</h2>
<div id="pdfList">Lade...</div>
</div>

</div>

<script src="supabase.js"></script>

<script>

// 🔥 Upload
async function uploadPDF(){

  const file = document.getElementById("fileInput").files[0];

  if(!file){
    alert("Bitte Datei wählen");
    return;
  }

  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabaseClient
    .storage
    .from("menus")
    .upload(fileName, file);

  if(error){
    alert("Upload Fehler: " + error.message);
    return;
  }

  const { data } = supabaseClient
    .storage
    .from("menus")
    .getPublicUrl(fileName);

  await supabaseClient
    .from("menu_files")
    .insert({
      file_url: data.publicUrl
    });

  alert("Upload erfolgreich!");
  loadPDFList();
}

// 🔥 PDF LISTE LADEN
async function loadPDFList(){

  const { data } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending:false });

  const container = document.getElementById("pdfList");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "Keine PDFs vorhanden";
    return;
  }

  data.forEach(pdf => {

    container.innerHTML += `
      <div class="file-item">
        <div>${pdf.file_url}</div>
        <button onclick="deletePDF('${pdf.file_url}')">Löschen</button>
      </div>
    `;
  });
}

// 🔥 DELETE
async function deletePDF(fileUrl){

  if(!confirm("Wirklich löschen?")) return;

  const path = fileUrl.split("/menus/")[1];

  await supabaseClient
    .storage
    .from("menus")
    .remove([path]);

  await supabaseClient
    .from("menu_files")
    .delete()
    .eq("file_url", fileUrl);

  alert("Gelöscht!");
  loadPDFList();
}

// START
loadPDFList();

</script>

</body>
</html>
