<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#14968F; color:white; }
.container { max-width:1000px; margin:auto; padding:40px; }
.card { background:white; color:black; padding:20px; border-radius:12px; margin-bottom:20px; }

button {
  background:#14968F;
  color:white;
  border:none;
  padding:8px;
  cursor:pointer;
}

.accordion {
  cursor:pointer;
  padding:10px;
  background:#14968F;
  color:white;
  border:none;
  width:100%;
  text-align:left;
  margin-top:10px;
}

.panel {
  display:none;
  background:white;
  color:black;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="card">
<h2>PDF Upload</h2>
<input type="file" id="fileInput">
<button onclick="uploadPDF()">Upload</button>
</div>

<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Wochenübersicht</button>
<button onclick="exportStats()">Analyse PDF</button>
</div>

<div id="summary"></div>
<div id="details"></div>

</div>

<script>

// ---------- HELPERS ----------
function formatDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(n){
  let days=[], d=new Date();
  while(days.length<n){
    if(d.getDay()!=0 && d.getDay()!=6) days.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return days;
}

// ---------- LOAD ----------
async function loadData(){

  const ordersRes = await supabaseClient.from("orders").select("*");
  const profilesRes = await supabaseClient.from("profiles").select("*");

  const orders = ordersRes.data || [];
  const profiles = profilesRes.data || [];

  const days = getNextWorkdays(10);

  let summaryHTML = `<div class="card"><h2>Übersicht (2 Wochen)</h2><table width="100%">`;
  summaryHTML += `<tr><th>Datum</th><th>Menu1</th><th>Menu2</th></tr>`;

  let detailsHTML = "";

  days.forEach(day=>{
    const d = formatDate(day);
    const dayOrders = orders.filter(o=>o.order_date===d);

    const m1 = dayOrders.filter(x=>x.selected_menu==="Menu 1").length;
    const m2 = dayOrders.filter(x=>x.selected_menu==="Menu 2").length;

    summaryHTML += `<tr><td>${d}</td><td>${m1}</td><td>${m2}</td></tr>`;

    let list="";
    dayOrders.forEach(o=>{
      const p = profiles.find(x=>x.id===o.user_id);
      list += `<li>${p?.full_name || "?"} → ${o.selected_menu}</li>`;
    });

    detailsHTML += `
      <button class="accordion">${d}</button>
      <div class="panel">
        <ul>${list || "<li>Keine Bestellungen</li>"}</ul>
      </div>
    `;
  });

  summaryHTML += "</table></div>";

  document.getElementById("summary").innerHTML = summaryHTML;
  document.getElementById("details").innerHTML = detailsHTML;

  initAccordion();
}

// ---------- ACCORDION ----------
function initAccordion(){
  document.querySelectorAll(".accordion").forEach(btn=>{
    btn.onclick = ()=>{
      const panel = btn.nextElementSibling;
      panel.style.display = panel.style.display==="block" ? "none" : "block";
    };
  });
}

// ---------- PDF WOCHEN EXPORT ----------
async function exportWeek(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data:orders } = await supabaseClient.from("orders").select("*");
  const { data:profiles } = await supabaseClient.from("profiles").select("*");

  let y=10;
  doc.text("Wochenreport",10,y);

  const days = getNextWorkdays(5);

  let totalM1=0, totalM2=0;

  days.forEach(day=>{
    const d = formatDate(day);
    const dayOrders = orders.filter(o=>o.order_date===d);

    const m1 = dayOrders.filter(x=>x.selected_menu==="Menu 1").length;
    const m2 = dayOrders.filter(x=>x.selected_menu==="Menu 2").length;

    totalM1 += m1;
    totalM2 += m2;

    y+=10;
    doc.text(`${d} | M1:${m1} | M2:${m2}`,10,y);

    dayOrders.forEach(o=>{
      const p = profiles.find(x=>x.id===o.user_id);
      y+=5;
      doc.text(`- ${p?.full_name || "?"} (${o.selected_menu})`,10,y);
    });
  });

  y+=10;
  doc.text(`TOTAL Woche: Menu1=${totalM1} Menu2=${totalM2}`,10,y);

  doc.save("wochenreport.pdf");
}

// ---------- ANALYSE PDF ----------
async function exportStats(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await supabaseClient.from("orders").select("*");

  // Wochen gruppieren
  const weeks = {};

  data.forEach(o=>{
    const week = o.order_date.substring(0,7); // YYYY-MM
    if(!weeks[week]) weeks[week]=0;
    weeks[week]++;
  });

  let y=10;
  doc.text("Analyse pro Monat",10,y);

  Object.entries(weeks).forEach(([w,v])=>{
    y+=10;
    doc.text(`${w}: ${v} Bestellungen`,10,y);
  });

  doc.save("analyse.pdf");
}

// ---------- PDF UPLOAD ----------
async function uploadPDF(){

  const file = document.getElementById("fileInput").files[0];
  if(!file){ alert("Datei wählen"); return;}

  const name = Date.now()+"_"+file.name;

  await supabaseClient.storage.from("menus").upload(name,file);

  const url = supabaseClient.storage.from("menus").getPublicUrl(name).data.publicUrl;

  await supabaseClient.from("menu_files").insert({ file_url:url });

  alert("Upload OK");
}

// ---------- START ----------
loadData();

</script>

</body>
</html>
