<script>

// DATUM FIX
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ARBEITSTAGE
function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }
  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// LOAD DATA
async function loadAdminData() {

  const { data: orders, error } = await window.supabaseClient
    .from("orders")
    .select("*");

  console.log("ORDERS:", orders);

  const days = getNextWorkdays(10);

  const tbody = document.querySelector("#summaryTable tbody");
  const detail = document.getElementById("detailContainer");

  tbody.innerHTML = "";
  detail.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);

    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${m1}</td>
        <td>${m2}</td>
      </tr>
    `;

    let list = "";
    dayOrders.forEach(o => {
      list += `<li>${o.user_id} → ${o.selected_menu}</li>`;
    });

    detail.innerHTML += `
      <div class="card">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <ul>${list || "<li>Keine Bestellungen</li>"}</ul>
      </div>
    `;
  });
}

// PDF UPLOAD
async function uploadPDF() {

  const file = document.getElementById("file").files[0];
  if (!file) return alert("Datei wählen");

  const fileName = Date.now() + ".pdf";

  const { error } = await window.supabaseClient.storage
    .from("menus")
    .upload(fileName, file);

  if (error) {
    alert("Upload Fehler");
    console.log(error);
    return;
  }

  const { data } = window.supabaseClient.storage
    .from("menus")
    .getPublicUrl(fileName);

  await window.supabaseClient.from("menu_files").insert({
    file_url: data.publicUrl
  });

  alert("PDF hochgeladen!");
}

// START
loadAdminData();

</script>
