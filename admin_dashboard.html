<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.topbar {
  position: absolute;
  top: 15px;
  left: 15px;
}

.topbar button {
  background: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

<h1>Admin Übersicht</h1>

<div class="card">
<h2>Wochenübersicht</h2>
<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div id="detailContainer"></div>

</div>

<script src="supabase.js"></script>

<script>

// 👉 Kalenderwoche (immer aktuelle Woche)
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function formatDate(date) {
  return date.toISOString().split("T")[0];
}

function getDayName(date) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][date.getDay()];
}

async function loadAdminData() {

  const monday = getMonday(new Date());

  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const { data: orders } = await window.supabaseClient
    .from("orders")
    .select(`
      order_date,
      selected_menu,
      profiles ( full_name )
    `);

  const tbody = document.querySelector("#summaryTable tbody");
  const detailContainer = document.getElementById("detailContainer");

  tbody.innerHTML = "";
  detailContainer.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDate(day);

    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${m1}</td>
        <td>${m2}</td>
      </tr>
    `;

    let list = "";

    dayOrders.forEach(o => {
      list += `<li>${o.profiles?.full_name} → ${o.selected_menu}</li>`;
    });

    detailContainer.innerHTML += `
      <div class="card">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <ul>${list || "<li>Keine Bestellungen</li>"}</ul>
      </div>
    `;
  });
}

loadAdminData();

</script>

</body>
</html>
