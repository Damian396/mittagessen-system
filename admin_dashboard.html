<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 900px;
  margin: auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
}

button {
  padding: 8px;
  margin: 5px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 5px;
}

.day {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
<button onclick="logout()">Logout</button>
</div>

<h2>Wochenübersicht</h2>

<div id="list"></div>

</div>

<script src="supabase.js"></script>

<script>

if (localStorage.getItem("admin_logged") !== "true") {
  window.location.href = "admin.html";
}

function getWeek() {
  let days = [];
  let today = new Date();

  for (let i = 0; i < 7; i++) {
    let d = new Date();
    d.setDate(today.getDate() + i);

    if (d.getDay() !== 0 && d.getDay() !== 6) {
      days.push(d.toISOString().split("T")[0]);
    }
  }

  return days;
}

async function load() {

  const days = getWeek();
  let html = "";

  for (let d of days) {

    const orders = await window.supabaseClient
      .from("orders")
      .select("*")
      .eq("order_date", d);

    let names = [];

    for (let o of orders.data) {
      const p = await window.supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", o.user_id)
        .single();

      if (p.data) names.push(p.data.full_name + " (" + o.selected_menu + ")");
    }

    html += `
      <div class="day">
        <b>${d}</b><br>
        Anzahl: ${orders.data.length}<br><br>
        ${names.join("<br>")}
      </div>
    `;
  }

  list.innerHTML = html;
}

function logout() {
  localStorage.removeItem("admin_logged");
  window.location.href = "admin.html";
}

load();
</script>

</body>
</html>
