<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #14968F;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

iframe {
  width: 100%;
  height: 400px;
  border: none;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

input[type="checkbox"] {
  transform: scale(1.3);
  cursor: pointer;
}

.delete-btn {
  background: #c0392b;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
}

.save-btn {
  background: #27ae60;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
}

.delete-btn:disabled,
.save-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.topbar {
  position: absolute;
  top: 10px;
  left: 10px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

<h1>Mittagessen Bestellung</h1>

<div class="card">
<h2>Menü (max. 2 PDFs)</h2>
<div id="menuContainer">Lade Menü...</div>
</div>

<div class="card">
<h2>2 Wochen Auswahl</h2>

<table>
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
<th>Bestellt</th>
<th>Speichern</th>
<th>Abmelden</th>
</tr>
</thead>
<tbody id="menuTable"></tbody>
</table>

</div>

</div>

<script>

// ---------- STATE ----------
const tempSelection = {};

// ---------- HELPERS ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// 🔥 NEUE BESTELL LOGIK
function isOrderTooLate(orderDateStr) {

  const now = new Date();
  const orderDate = new Date(orderDateStr);

  const cutoff = new Date(orderDate);

  const day = orderDate.getDay();

  if (day === 1) {
    // Montag → Freitag davor 13:00
    cutoff.setDate(orderDate.getDate() - 3);
  } else {
    // normal → Vortag
    cutoff.setDate(orderDate.getDate() - 1);
  }

  cutoff.setHours(13, 0, 0, 0);

  return now > cutoff;
}

// ---------- PDF ----------
async function loadMenuPDF(){
  const { data } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(2);

  const container = document.getElementById("menuContainer");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "Kein Menü verfügbar";
    return;
  }

  data.forEach(pdf => {
    container.innerHTML += `<iframe src="${pdf.file_url}"></iframe>`;
  });
}

// ---------- DASHBOARD ----------
async function loadDashboard() {

  const user = (await supabaseClient.auth.getUser()).data.user;

  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  const days = getNextWorkdays(10);
  const table = document.getElementById("menuTable");
  table.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const myOrder = orders.find(o => o.order_date === dateStr);

    const selected = tempSelection[dateStr] || myOrder?.selected_menu;

    const m1Checked = selected === "Menu 1" ? "checked" : "";
    const m2Checked = selected === "Menu 2" ? "checked" : "";

    const tooLate = isOrderTooLate(dateStr);
    const disabled = tooLate ? "disabled" : "";
    const hasOrder = myOrder ? "" : "disabled";

    const orderedCount = myOrder ? "1" : "0";

    table.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>

        <td>
          <input type="checkbox"
            ${m1Checked}
            ${disabled}
            onclick="handleLate('${dateStr}')"
            onchange="selectTemp('${dateStr}','Menu 1')">
        </td>

        <td>
          <input type="checkbox"
            ${m2Checked}
            ${disabled}
            onclick="handleLate('${dateStr}')"
            onchange="selectTemp('${dateStr}','Menu 2')">
        </td>

        <td><strong>${orderedCount}</strong></td>

        <td>
          <button class="save-btn"
            ${disabled}
            onclick="saveSelection('${dateStr}')">
            💾
          </button>
        </td>

        <td>
          <button class="delete-btn"
            ${hasOrder}
            ${disabled}
            onclick="cancel('${dateStr}')">
            ✖
          </button>
        </td>
      </tr>
    `;
  });
}

// ---------- HANDLE TOO LATE ----------
function handleLate(date){

  if (isOrderTooLate(date)) {
    alert("Zu spät für die Anmeldung!\nBitte melde dich unter: 0717953116");
  }
}

// ---------- TEMP ----------
function selectTemp(date, menu){
  tempSelection[date] = menu;
  loadDashboard();
}

// ---------- SAVE ----------
async function saveSelection(date){

  if (isOrderTooLate(date)) {
    alert("Zu spät für die Anmeldung!\nBitte melde dich unter: 0717953116");
    return;
  }

  const menu = tempSelection[date];

  if (!menu) {
    alert("Bitte zuerst Menü wählen");
    return;
  }

  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient.from("orders").upsert({
    user_id: user.id,
    order_date: date,
    selected_menu: menu,
    status: "ordered"
  });

  delete tempSelection[date];
  loadDashboard();
}

// ---------- CANCEL ----------
async function cancel(date){

  if (isOrderTooLate(date)) {
    alert("Zu spät für die Abmeldung!");
    return;
  }

  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadDashboard();
}

// ---------- START ----------
window.onload = () => {
  loadDashboard();
  loadMenuPDF();
};

</script>

</body>
</html>
