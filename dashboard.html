<script>

// DATUM FIX
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ARBEITSTAGE
function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// PDF
async function loadMenuPDF() {
  const { data } = await window.supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(1);

  if (data && data.length > 0) {
    document.getElementById("menuPDF").src = data[0].file_url;
  }
}

// DASHBOARD
async function loadDashboard() {

  const user = (await window.supabaseClient.auth.getUser()).data.user;

  const { data: orders } = await window.supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  const days = getNextWorkdays(10);

  const container = document.getElementById("weekContainer");
  container.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const myOrder = orders.find(o => o.order_date === dateStr);

    container.innerHTML += `
      <div class="card">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <p>${myOrder ? "Dein Menü: "+myOrder.selected_menu : "Keine Bestellung"}</p>

        <button onclick="order('${dateStr}','Menu 1')">Menü 1</button>
        <button onclick="order('${dateStr}','Menu 2')">Menü 2</button>
        <button onclick="cancel('${dateStr}')">Abmelden</button>
      </div>
    `;
  });
}

// ORDER
async function order(date, menu) {

  const user = (await window.supabaseClient.auth.getUser()).data.user;

  await window.supabaseClient.from("orders").upsert({
    user_id: user.id,
    order_date: date,
    selected_menu: menu,
    status: "ordered"
  });

  loadDashboard();
}

// CANCEL
async function cancel(date) {

  const user = (await window.supabaseClient.auth.getUser()).data.user;

  await window.supabaseClient
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadDashboard();
}

// START
loadDashboard();
loadMenuPDF();

</script>
