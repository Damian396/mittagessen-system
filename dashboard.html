<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #14968F;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

.delete-btn {
  background: #c0392b;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Mittagessen Bestellung</h1>

<div class="card">
<h2>2 Wochen Auswahl</h2>

<table>
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
<th>Bestellt</th>
<th>Abmelden</th>
</tr>
</thead>
<tbody id="menuTable"></tbody>
</table>

</div>

</div>

<script>

function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

async function loadDashboard() {

  const user = (await supabaseClient.auth.getUser()).data.user;

  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  const days = getNextWorkdays(10);
  const table = document.getElementById("menuTable");
  table.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const myOrder = orders.find(o => o.order_date === dateStr);

    const ordered = myOrder ? "1" : "0";

    table.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td><input type="checkbox" ${myOrder?.selected_menu==="Menu 1"?"checked":""}></td>
        <td><input type="checkbox" ${myOrder?.selected_menu==="Menu 2"?"checked":""}></td>
        <td><strong>${ordered}</strong></td>
        <td>
          <button onclick="cancel('${dateStr}')">✖</button>
        </td>
      </tr>
    `;
  });
}

async function cancel(date){
  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadDashboard();
}

window.onload = loadDashboard;

</script>

</body>
</html>
