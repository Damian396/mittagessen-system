<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
body { margin:0; font-family:Arial; background:#14968F; color:white; }
.container { max-width:900px; margin:auto; padding:40px; }
.card { background:white; color:black; padding:20px; border-radius:12px; margin-bottom:20px; }
button { background:#14968F; color:white; border:none; padding:8px; margin:5px; cursor:pointer; }
iframe { width:100%; height:400px; border:none; }
.topbar {
  position:absolute;
  top:10px;
  left:10px;
}
.topbar button {
  background:white;
  border:none;
  padding:8px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

<h1>Mittagessen Bestellung</h1>

<div class="card">
<h2>Menü (PDF)</h2>
<iframe id="menuPDF"></iframe>
</div>

<div id="weekContainer"></div>

</div>

<script>

// ---------- HELPER ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

function isTooLate(dateStr) {
  const now = new Date();
  const todayStr = formatDateLocal(now);
  return dateStr === todayStr && now.getHours() >= 7;
}

// ---------- PDF LADEN ----------
async function loadMenuPDF() {

  try {

    const res = await window.supabaseClient
      .from("menu_files")
      .select("*")
      .order("created_at", { ascending:false })
      .limit(1);

    console.log("PDF:", res);

    if (res.data && res.data.length > 0) {
      document.getElementById("menuPDF").src = res.data[0].file_url;
    }

  } catch (err) {
    console.log("PDF Fehler:", err);
  }
}

// ---------- DASHBOARD ----------
async function loadDashboard() {

  try {

    if (!window.supabaseClient) {
      alert("Supabase nicht geladen!");
      return;
    }

    const userRes = await window.supabaseClient.auth.getUser();

    console.log("USER:", userRes);

    const user = userRes.data.user;

    if (!user) {
      alert("Nicht eingeloggt!");
      window.location.href = "login.html";
      return;
    }

    const orderRes = await window.supabaseClient
      .from("orders")
      .select("*")
      .eq("user_id", user.id);

    console.log("ORDERS:", orderRes);

    if (orderRes.error) {
      console.log(orderRes.error);
      alert("Fehler beim Laden Bestellungen");
      return;
    }

    const orders = orderRes.data || [];

    const days = getNextWorkdays(10);

    const container = document.getElementById("weekContainer");
    container.innerHTML = "";

    days.forEach(day => {

      const dateStr = formatDateLocal(day);

      const myOrder = orders.find(o => o.order_date === dateStr);

      container.innerHTML += `
        <div class="card">
          <h3>${getDayName(day)} - ${dateStr}</h3>
          <p>${myOrder ? "Dein Menü: " + myOrder.selected_menu : "Keine Bestellung"}</p>

          <button onclick="order('${dateStr}','Menu 1')">Menü 1</button>
          <button onclick="order('${dateStr}','Menu 2')">Menü 2</button>
          <button onclick="cancel('${dateStr}')">Abmelden</button>
        </div>
      `;
    });

  } catch (err) {
    console.log("CRASH:", err);
    alert("Dashboard Fehler – Console prüfen");
  }
}

// ---------- BESTELLEN ----------
async function order(date, menu) {

  try {

    if (isTooLate(date)) {
      alert("Zu spät! Nach 07:00 nicht möglich");
      return;
    }

    const user = (await window.supabaseClient.auth.getUser()).data.user;

    await window.supabaseClient.from("orders").upsert({
      user_id: user.id,
      order_date: date,
      selected_menu: menu,
      status: "ordered"
    });

    loadDashboard();

  } catch (err) {
    console.log(err);
    alert("Bestellung Fehler");
  }
}

// ---------- ABBRECHEN ----------
async function cancel(date) {

  try {

    if (isTooLate(date)) {
      alert("Zu spät zum Abmelden!");
      return;
    }

    const user = (await window.supabaseClient.auth.getUser()).data.user;

    await window.supabaseClient
      .from("orders")
      .delete()
      .eq("user_id", user.id)
      .eq("order_date", date);

    loadDashboard();

  } catch (err) {
    console.log(err);
    alert("Abmeldung Fehler");
  }
}

// ---------- START ----------
window.onload = () => {
  loadDashboard();
  loadMenuPDF();
};

</script>

</body>
</html>
