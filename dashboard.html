<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #14968F;
  color: white;
  min-height: 100vh;
}

.topbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 100;
}

.topbar button {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1.5px solid rgba(255,255,255,0.5);
  color: white;
  padding: 8px 16px 8px 12px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}

.topbar button:hover {
  background: rgba(255,255,255,0.35);
}

.container {
  max-width: 960px;
  margin: auto;
  padding: 70px 15px 30px;
}

h1 { margin-top: 0; font-size: clamp(1.4rem, 4vw, 2rem); }
h2 { font-size: clamp(1.1rem, 3vw, 1.5rem); margin-top: 0; }

.card {
  background: white;
  color: black;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

/* ---- PDF Viewer ---- */
.pdf-entry { margin-bottom: 12px; }
.pdf-entry:last-child { margin-bottom: 0; }

.pdf-iframe-wrap {
  width: 100%;
  height: 320px;
  display: block;
}

.pdf-iframe-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 6px;
}

.pdf-link-btn {
  display: none;
  width: 100%;
  padding: 14px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
}

@media (max-width: 700px) {
  .pdf-iframe-wrap { display: none; }
  .pdf-link-btn { display: block; }
}

/* ---- Table ---- */
.table-wrapper { overflow-x: auto; }

table {
  width: 100%;
  min-width: 600px;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
  padding: 10px;
  text-align: center;
}

td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
  vertical-align: middle;
}

input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }

.delete-btn {
  background: #c0392b;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.save-btn {
  background: #27ae60;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.delete-btn:disabled, .save-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ---- Quantity controls ---- */
.qty-control {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.qty-btn {
  background: #14968F;
  color: white;
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.qty-value {
  min-width: 20px;
  text-align: center;
  font-weight: bold;
}

/* ---- Mobile table → cards ---- */
@media (max-width: 650px) {
  .table-wrapper { overflow-x: unset; }
  table, tbody { display: block; min-width: unset; }
  thead { display: none; }

  tr {
    display: block;
    background: #f8f8f8;
    border-radius: 10px;
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid #ddd;
  }

  td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 4px;
    border: none;
    border-bottom: 1px solid #eee;
    text-align: right;
  }

  td:last-child { border-bottom: none; }

  td::before {
    content: attr(data-label);
    font-weight: bold;
    color: #555;
    text-align: left;
    flex: 1;
    margin-right: 10px;
  }

  .save-btn, .delete-btn {
    padding: 10px 16px;
    font-size: 15px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

  <h1>Mittagessen Bestellung</h1>

  <div class="card">
    <h2>Menü</h2>
    <div id="menuContainer">Lade Menü...</div>
  </div>

  <div class="card table-wrapper">
    <h2>2 Wochen Auswahl</h2>

    <table>
      <thead>
        <tr>
          <th>Tag</th>
          <th>Datum</th>
          <th>Menü 1</th>
          <th>Menü 2</th>
          <th>Anzahl</th>
          <th>Speichern</th>
          <th>Abmelden</th>
        </tr>
      </thead>
      <tbody id="menuTable"></tbody>
    </table>
  </div>

</div>

<script>
const tempSelection = {};
const tempQty = {};

function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();
  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }
  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

function isOrderTooLate(orderDateStr) {
  const now = new Date();
  const orderDate = new Date(orderDateStr);
  const cutoff = new Date(orderDate);
  const day = orderDate.getDay();
  if (day === 1) cutoff.setDate(orderDate.getDate() - 3);
  else cutoff.setDate(orderDate.getDate() - 1);
  cutoff.setHours(13, 0, 0, 0);
  return now > cutoff;
}

async function loadMenuPDF() {
  const { data } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(2);

  const container = document.getElementById("menuContainer");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "Kein Menü verfügbar";
    return;
  }

  data.forEach(pdf => {
    container.innerHTML += `
      <div class="pdf-entry">
        <div class="pdf-iframe-wrap">
          <iframe src="${pdf.file_url}"></iframe>
        </div>
        <a class="pdf-link-btn" href="${pdf.file_url}" target="_blank">📄 Menü PDF öffnen</a>
      </div>
    `;
  });
}

async function loadDashboard() {
  const user = (await supabaseClient.auth.getUser()).data.user;

  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  const days = getNextWorkdays(10);
  const table = document.getElementById("menuTable");
  table.innerHTML = "";

  days.forEach(day => {
    const dateStr = formatDateLocal(day);
    const myOrder = orders.find(o => o.order_date === dateStr);
    const selected = tempSelection[dateStr] || myOrder?.selected_menu;

    const m1Checked = selected === "Menu 1" ? "checked" : "";
    const m2Checked = selected === "Menu 2" ? "checked" : "";

    const tooLate = isOrderTooLate(dateStr);
    const disabled = tooLate ? "disabled" : "";
    const hasOrder = myOrder ? "" : "disabled";

    const currentQty = tempQty[dateStr] ?? (myOrder?.quantity || 1);

    table.innerHTML += `
      <tr>
        <td data-label="Tag">${getDayName(day)}</td>
        <td data-label="Datum">${dateStr}</td>

        <td data-label="Menü 1">
          <input type="checkbox" ${m1Checked} ${disabled}
            onclick="handleLate('${dateStr}')"
            onchange="selectTemp('${dateStr}','Menu 1')">
        </td>

        <td data-label="Menü 2">
          <input type="checkbox" ${m2Checked} ${disabled}
            onclick="handleLate('${dateStr}')"
            onchange="selectTemp('${dateStr}','Menu 2')">
        </td>

        <td data-label="Anzahl">
          <div class="qty-control">
            <button class="qty-btn" ${disabled} onclick="changeQty('${dateStr}',-1)">−</button>
            <span class="qty-value" id="qty_${dateStr}">${currentQty}</span>
            <button class="qty-btn" ${disabled} onclick="changeQty('${dateStr}',1)">+</button>
          </div>
        </td>

        <td data-label="Speichern">
          <button class="save-btn" ${disabled}
            onclick="saveSelection('${dateStr}')">💾</button>
        </td>

        <td data-label="Abmelden">
          <button class="delete-btn" ${hasOrder} ${disabled}
            onclick="cancel('${dateStr}')">✖</button>
        </td>
      </tr>
    `;
  });
}

function handleLate(date) {
  if (isOrderTooLate(date)) {
    alert("Zu spät für die Anmeldung!\nBitte melde dich unter: 0717953116");
  }
}

function selectTemp(date, menu) {
  tempSelection[date] = menu;
  loadDashboard();
}

function changeQty(date, delta) {
  const el = document.getElementById(`qty_${date}`);
  const current = parseInt(el.textContent) || 1;
  const next = Math.max(1, current + delta);
  tempQty[date] = next;
  el.textContent = next;
}

async function saveSelection(date) {
  if (isOrderTooLate(date)) {
    alert("Zu spät für die Anmeldung!\nBitte melde dich unter: 0717953116");
    return;
  }

  const menu = tempSelection[date];
  if (!menu) {
    alert("Bitte zuerst Menü wählen");
    return;
  }

  const qty = tempQty[date] || 1;
  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient.from("orders").upsert({
    user_id: user.id,
    order_date: date,
    selected_menu: menu,
    quantity: qty,
    status: "ordered"
  });

  delete tempSelection[date];
  delete tempQty[date];
  loadDashboard();
}

async function cancel(date) {
  if (isOrderTooLate(date)) {
    alert("Zu spät für die Abmeldung!");
    return;
  }

  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadDashboard();
}

window.onload = () => {
  loadDashboard();
  loadMenuPDF();
};
</script>

</body>
</html>
