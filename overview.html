<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Übersicht</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #14968F;
  color: white;
  min-height: 100vh;
}

.topbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 100;
  display: flex;
  gap: 10px;
}

.topbar button {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1.5px solid rgba(255,255,255,0.5);
  color: white;
  padding: 8px 16px 8px 12px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}

.topbar button:hover {
  background: rgba(255,255,255,0.35);
}

.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 80px 16px 30px;
}

.card {
  background: white;
  color: #333;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.15);
  margin-bottom: 22px;
}

h2 {
  margin-top: 0;
  color: #14968F;
}

.info-text {
  margin: -4px 0 18px;
  padding: 12px 14px;
  background: #eaf7f6;
  border-left: 5px solid #14968F;
  border-radius: 8px;
  color: #333;
  line-height: 1.45;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}

th, td {
  border-bottom: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

th {
  background: #14968F;
  color: white;
}

.status-ok {
  color: #14968F;
  font-weight: bold;
}

.status-empty {
  color: #999;
}

@media (max-width: 700px) {
  .container {
    padding-top: 70px;
  }

  table {
    min-width: 0;
  }

  thead {
    display: none;
  }

  tr {
    display: block;
    margin-bottom: 16px;
    background: #f7f7f7;
    border-radius: 12px;
    padding: 10px;
  }

  td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ddd;
    text-align: right;
  }

  td::before {
    content: attr(data-label);
    font-weight: bold;
    color: #14968F;
    text-align: left;
  }

  td:last-child {
    border-bottom: none;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="window.location.href='dashboard.html'">⬅ Zurück</button>
  <button onclick="window.location.href='index.html'">🏠 Start</button>
</div>

<div class="container">
  <div class="card">
    <h2>Zweiwochenübersicht</h2>
    <p class="info-text">Hier siehst du deine Bestellungen für die nächsten zwei Arbeitswochen.</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tag</th>
            <th>Datum</th>
            <th>Bestellung</th>
            <th>Anzahl</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="overviewTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function formatDateDisplay(dateStr) {
  const [year, month, day] = dateStr.split("-");
  return `${day}.${month}.${year}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();

    if (d !== 0 && d !== 6) {
      days.push(new Date(current));
    }

    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"][d.getDay()];
}

async function getCurrentUser() {
  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data.user) {
    console.error("Kein Benutzer angemeldet:", error);
    alert("Du bist nicht angemeldet.");
    window.location.href = "login.html";
    return null;
  }

  return data.user;
}

async function loadOverview() {
  const user = await getCurrentUser();

  if (!user) {
    return;
  }

  const days = getNextWorkdays(10);
  const startDate = formatDateLocal(days[0]);
  const endDate = formatDateLocal(days[days.length - 1]);

  const { data: orders, error } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id)
    .gte("order_date", startDate)
    .lte("order_date", endDate)
    .order("order_date", { ascending: true });

  if (error) {
    console.error("Fehler beim Laden der Übersicht:", error);
    alert("Fehler beim Laden der Übersicht: " + error.message);
    return;
  }

  const safeOrders = orders || [];
  const table = document.getElementById("overviewTable");
  table.innerHTML = "";

  days.forEach(day => {
    const dateStr = formatDateLocal(day);
    const order = safeOrders.find(o => o.order_date === dateStr);

    const menu = order ? order.selected_menu : "Keine Bestellung";
    const quantity = order ? Number(order.quantity || 1) : "-";
    const status = order ? "Angemeldet" : "Nicht angemeldet";
    const statusClass = order ? "status-ok" : "status-empty";

    table.innerHTML += `
      <tr>
        <td data-label="Tag">${getDayName(day)}</td>
        <td data-label="Datum">${formatDateDisplay(dateStr)}</td>
        <td data-label="Bestellung">${menu}</td>
        <td data-label="Anzahl">${quantity}</td>
        <td data-label="Status" class="${statusClass}">${status}</td>
      </tr>
    `;
  });
}

window.onload = () => {
  loadOverview();
};
</script>

</body>
</html>
