<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Login / Registrierung</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Passwort"><br><br>

<button onclick="signUp()">Registrieren</button>
<button onclick="login()">Login</button>

<h3 id="status"></h3>

<!-- NUR EINMAL -->
<script src="supabase.js"></script>

<script>
console.log("Supabase Objekt:", supabase);

async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  console.log("Signup Klick");

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  console.log("RESULT:", data, error);

  if (error) {
    document.getElementById("status").innerText = error.message;
  } else {
    document.getElementById("status").innerText = "Registriert!";
  }
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
  } else {
    window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
