<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mittagessen Bestellung</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #14968F; /* DEINE FARBE */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    h1 {
      margin-bottom: 20px;
      color: #14968F;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background-color: #14968F;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0f7a75;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      color: red;
    }

    .title-top {
      position: absolute;
      top: 30px;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="title-top">Mittagessen Bestellung</div>

<div class="card">

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">

  <button onclick="signUp()">Registrieren</button>
  <button onclick="login()">Login</button>

  <div id="status"></div>
</div>

<script src="supabase.js"></script>

<script>
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await window.supabaseClient.auth.signUp({
    email,
    password
  });

  document.getElementById("status").innerText =
    error ? error.message : "Registrierung erfolgreich!";
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await window.supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
  } else {
    window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
