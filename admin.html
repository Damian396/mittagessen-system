<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #14968F;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="card">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">

<button onclick="login()">Login</button>
</div>

<script>
async function login() {

  const res = await window.supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (res.error) {
    alert("Login falsch");
    return;
  }

  const profile = await window.supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", res.data.user.id)
    .single();

  if (!profile.data || profile.data.role !== "admin") {
    alert("Kein Admin!");
    return;
  }

  window.location.href = "admin_dashboard.html";
}
</script>

</body>
</html>
